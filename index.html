<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Cell Division Simulation By - Aditya Patra</title>
<style>
  :root {
    --bg-color: #f8fafc;
    --text-primary: #0f172a;
    --text-muted: #64748b;
    --accent: #2563eb;
    --border: #e2e8f0;
    
    /* Cell Color Palette */
    --membrane-stroke: #0284c7;
    --membrane-fill: #f0f9ff;
    --nucleus-stroke: #0369a1;
    --nucleus-fill: #e0f2fe;
    --spindle-color: #eab308;
    
    /* Chromosome Palette */
    --ch-red-dark: #dc2626;
    --ch-red-light: #f87171;
    --ch-blue-dark: #2563eb;
    --ch-blue-light: #60a5fa;
    --ch-purple-dark: #7c3aed;
    --ch-purple-light: #a78bfa;
  }

  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: system-ui, -apple-system, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-primary);
  }

  .viewport {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Floating UI Overlays */
  .header-ui {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 32px;
    box-sizing: border-box;
    z-index: 10;
    pointer-events: none;
  }

  .title-text {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    pointer-events: auto;
  }

  .mode-toggle {
    background-color: rgba(255, 255, 255, 0.85);
    border: 1px solid var(--border);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(8px);
    pointer-events: auto;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
  }

  .mode-toggle:hover {
    background-color: #fff;
    transform: translateY(-1px);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
  }

  /* Core Canvas Area */
  .canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #simulationSvg {
    width: auto;
    height: 80%;
    max-width: 95%;
    max-height: 85vh;
  }

  /* Ultra-smooth hardware accelerated transitions */
  circle, ellipse, line, path, g {
    transition: all 1.1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .caption-ui {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 32px;
    box-sizing: border-box;
    z-index: 10;
    background: linear-gradient(transparent, var(--bg-color) 40%);
    pointer-events: none;
  }

  .step-title {
    color: var(--accent);
    font-size: 26px;
    font-weight: 800;
    margin: 0 0 6px 0;
  }

  .step-desc {
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1.6;
    max-width: 680px;
    margin: 0 auto;
  }

  .help-tip {
    margin-top: 16px;
    font-size: 12px;
    color: #94a3b8;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="viewport">
  <div class="header-ui">
    <div class="title-text" id="typeDisplay">Mitosis (Body Cells)</div>
    <button class="mode-toggle" id="switchBtn">Switch to Meiosis</button>
  </div>

  <div class="canvas-container">
    <svg id="simulationSvg" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
      
      <g id="spindles" opacity="0">
        <line x1="150" y1="250" x2="650" y2="250" stroke="var(--spindle-color)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3"></line>
        <path id="fiberL1" d="M 180 250 Q 400 120 620 250" fill="none" stroke="var(--spindle-color)" stroke-width="1.5" opacity="0.4"/>
        <path id="fiberL2" d="M 180 250 Q 400 380 620 250" fill="none" stroke="var(--spindle-color)" stroke-width="1.5" opacity="0.4"/>
        <circle cx="180" cy="250" r="4" fill="var(--spindle-color)"/>
        <circle cx="620" cy="250" r="4" fill="var(--spindle-color)"/>
      </g>

      <g id="membranes">
        <path id="cellMembrane1" d="M 400,250 m -120,0 a 120,120 0 1,0 240,0 a 120,120 0 1,0 -240,0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="4"/>
        <path id="cellMembrane2" d="M 400,250 m -120,0 a 120,120 0 1,0 240,0 a 120,120 0 1,0 -240,0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="4" opacity="0"/>
        
        <circle id="membrane3" cx="240" cy="140" r="0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="3" opacity="0"/>
        <circle id="membrane4" cx="240" cy="360" r="0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="3" opacity="0"/>
        <circle id="membrane5" cx="560" cy="140" r="0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="3" opacity="0"/>
        <circle id="membrane6" cx="560" cy="360" r="0" fill="var(--membrane-fill)" stroke="var(--membrane-stroke)" stroke-width="3" opacity="0"/>
      </g>

      <g id="nuclei">
        <circle id="nucleus1" cx="400" cy="250" r="55" fill="var(--nucleus-fill)" stroke="var(--nucleus-stroke)" stroke-width="2"/>
        <circle id="nucleus2" cx="400" cy="250" r="55" fill="var(--nucleus-fill)" stroke="var(--nucleus-stroke)" stroke-width="2" opacity="0"/>
      </g>

      <g id="chromosomes">
        <g id="ch1">
          <line id="ch1_arm1" x1="0" y1="-14" x2="0" y2="14" stroke="var(--ch-red-dark)" stroke-width="5" stroke-linecap="round"/>
          <line id="ch1_arm2" x1="-14" y1="0" x2="14" y2="0" stroke="var(--ch-red-dark)" stroke-width="5" stroke-linecap="round"/>
          <circle cx="0" cy="0" r="5" fill="var(--ch-red-light)"/>
        </g>
        <g id="ch2">
          <line id="ch2_arm1" x1="0" y1="-14" x2="0" y2="14" stroke="var(--ch-blue-dark)" stroke-width="5" stroke-linecap="round"/>
          <line id="ch2_arm2" x1="-14" y1="0" x2="14" y2="0" stroke="var(--ch-blue-dark)" stroke-width="5" stroke-linecap="round"/>
          <circle cx="0" cy="0" r="5" fill="var(--ch-blue-light)"/>
        </g>
        
        <g id="frag1" opacity="0"><line x1="-14" y1="0" x2="14" y2="0" stroke="var(--ch-red-dark)" stroke-width="5" stroke-linecap="round"/><circle cx="0" cy="0" r="5" fill="var(--ch-red-light)"/></g>
        <g id="frag2" opacity="0"><line x1="-14" y1="0" x2="14" y2="0" stroke="var(--ch-blue-dark)" stroke-width="5" stroke-linecap="round"/><circle cx="0" cy="0" r="5" fill="var(--ch-blue-light)"/></g>
        <g id="frag3" opacity="0"><line x1="-14" y1="0" x2="14" y2="0" stroke="var(--ch-purple-dark)" stroke-width="5" stroke-linecap="round"/><circle cx="0" cy="0" r="5" fill="var(--ch-purple-light)"/></g>
        <g id="frag4" opacity="0"><line x1="-14" y1="0" x2="14" y2="0" stroke="var(--ch-red-dark)" stroke-width="5" stroke-linecap="round"/><circle cx="0" cy="0" r="5" fill="var(--ch-red-light)"/></g>
      </g>
    </svg>
  </div>

  <div class="caption-ui">
    <h2 class="step-title" id="textHeading">Stage Title</h2>
    <p class="step-desc" id="textDesc">Stage description content text goes here.</p>
    <div class="help-tip">Use <b>← Left Arrow</b> and <b>→ Right Arrow</b> to control step animation</div>
  </div>
</div>

<script>
(function(){
  const mitosis = [
    { title: "1. Resting Stage", desc: "The cell performs its normal life duties. Genetic materials are loosely packed safely inside the single nuclear wall." },
    { title: "2. Duplicating DNA", desc: "The cell prepares for division by creating an exact replica of its entire DNA sequence." },
    { title: "3. Chromosomes Pack Tight", desc: "The loose DNA strands wind up into clean, visible X-shapes. The cell matrix gears up to dissolve the core nucleus boundary." },
    { title: "4. Center Align", desc: "Spindle fibers lock onto the chromosomes and steer them directly onto a single-file line along the cell's center equator." },
    { title: "5. Mitotic Pull Split", desc: "The structural bindings snap! Chromosomes divide cleanly in half, pulled backward to opposite polar ends." },
    { title: "6. Cytoplasm Pinching", desc: "The outer cellular boundaries morph and pinch inward dynamically down the center line." },
    { title: "7. Two Twin Cells Complete", desc: "The cleavage finishes splitting. Two completely autonomous clone cells emerge with matching structural DNA." }
  ];

  const meiosis = [
    { title: "1. Resting Setup", desc: "The initial reproductive structure grows and replicates its native DNA code exactly like standard mitosis." },
    { title: "2. The Trait Crossover", desc: "Paired structures link together tightly, physically snapping and swapping segments to produce completely unique trait arrangements." },
    { title: "3. Double File Line", desc: "Instead of a single line, paired matching structures align parallel along the middle equator line." },
    { title: "4. First Big Pull", desc: "The spindle lines yank whole X-complexes away from each other, but individual structural arms remain locked together." },
    { title: "5. Intermediate Double Separation", desc: "The parent housing undergoes its first split, yielding two distinct cells with unique trait variants." },
    { title: "6. Secondary Arm Snap", desc: "Within both cells, identical sister strands map onto new lines and are broken apart a second time." },
    { title: "7. Four Unique Cells", desc: "The framework splits once more, delivering four entirely individual cells, each holding exactly half the standard genetic material." }
  ];

  let mode = 'mitosis';
  let data = mitosis;
  let index = 0;

  const typeDisplay = document.getElementById('typeDisplay');
  const switchBtn = document.getElementById('switchBtn');
  const textHeading = document.getElementById('textHeading');
  const textDesc = document.getElementById('textDesc');

  // SVG Elements
  const m1 = document.getElementById('cellMembrane1');
  const m2 = document.getElementById('cellMembrane2');
  const n1 = document.getElementById('nucleus1');
  const n2 = document.getElementById('nucleus2');
  const spindles = document.getElementById('spindles');
  
  const ch1 = document.getElementById('ch1');
  const ch1_arm2 = document.getElementById('ch1_arm2');
  const ch2 = document.getElementById('ch2');
  const ch2_arm2 = document.getElementById('ch2_arm2');
  
  const f1 = document.getElementById('frag1');
  const f2 = document.getElementById('frag2');
  const f3 = document.getElementById('frag3');
  const f4 = document.getElementById('frag4');

  const m3 = document.getElementById('membrane3');
  const m4 = document.getElementById('membrane4');
  const m5 = document.getElementById('membrane5');
  const m6 = document.getElementById('membrane6');

  function render() {
    textHeading.textContent = data[index].title;
    textDesc.textContent = data[index].desc;

    // --- CENTRALIZED STATE RESET ---
    // Fixes forward/backward rendering bugs by resetting layout defaults before timelines run
    m1.style.opacity = 1;
    m2.style.opacity = 0;
    m1.setAttribute('d', "M 400,250 m -120,0 a 120,120 0 1,0 240,0 a 120,120 0 1,0 -240,0");
    m2.setAttribute('d', "M 400,250 m -120,0 a 120,120 0 1,0 240,0 a 120,120 0 1,0 -240,0");
    
    m3.style.opacity = 0; m4.style.opacity = 0; m5.style.opacity = 0; m6.style.opacity = 0;
    m3.setAttribute('r', 0); m4.setAttribute('r', 0); m5.setAttribute('r', 0); m6.setAttribute('r', 0);

    n1.style.opacity = 1; n2.style.opacity = 0;
    n1.setAttribute('cx', 400); n1.setAttribute('cy', 250); n1.setAttribute('r', 55);
    n2.setAttribute('cx', 400); n2.setAttribute('cy', 250); n2.setAttribute('r', 55);
    
    spindles.style.opacity = 0;
    
    ch1.style.opacity = 1; ch2.style.opacity = 1;
    ch1_arm2.style.opacity = 1; ch2_arm2.style.opacity = 1;
    f1.style.opacity = 0; f2.style.opacity = 0; f3.style.opacity = 0; f4.style.opacity = 0;
    // --------------------------------

    if (mode === 'mitosis') {
      runMitosisTimeline();
    } else {
      runMeiosisTimeline();
    }
  }

  function runMitosisTimeline() {
    if (index === 0) {
      ch1.setAttribute('transform', 'translate(385, 240) rotate(15) scale(0.6)');
      ch2.setAttribute('transform', 'translate(415, 260) rotate(-35) scale(0.6)');
    } 
    else if (index === 1) {
      n1.setAttribute('r', 65);
      ch1.setAttribute('transform', 'translate(375, 235) rotate(45) scale(1)');
      ch2.setAttribute('transform', 'translate(420, 265) rotate(-10) scale(1)');
    }
    else if (index === 2) {
      ch1.setAttribute('transform', 'translate(380, 230) rotate(70) scale(1.3)');
      ch2.setAttribute('transform', 'translate(415, 270) rotate(-50) scale(1.3)');
    }
    else if (index === 3) {
      n1.style.opacity = 0; spindles.style.opacity = 1;
      m1.setAttribute('d', "M 400,250 m -140,0 a 140,110 0 1,0 280,0 a 140,110 0 1,0 -280,0");
      ch1.setAttribute('transform', 'translate(400, 190) rotate(90) scale(1.3)');
      ch2.setAttribute('transform', 'translate(400, 310) rotate(90) scale(1.3)');
    }
    else if (index === 4) {
      spindles.style.opacity = 1; n1.style.opacity = 0;
      m1.setAttribute('d', "M 400,250 m -140,0 a 140,110 0 1,0 280,0 a 140,110 0 1,0 -280,0");
      ch1_arm2.style.opacity = 0; ch2_arm2.style.opacity = 0;
      ch1.setAttribute('transform', 'translate(250, 190) rotate(45) scale(1.3)');
      ch2.setAttribute('transform', 'translate(250, 310) rotate(45) scale(1.3)');
      
      f1.setAttribute('transform', 'translate(550, 190) rotate(-45) scale(1.3)');
      f2.setAttribute('transform', 'translate(550, 310) rotate(-45) scale(1.3)');
      f1.style.opacity = 1; f2.style.opacity = 1;
    }
    else if (index === 5) {
      n1.style.opacity = 0;
      m1.setAttribute('d', "M 240,250 C 240,150 360,190 360,250 C 360,310 240,350 240,250 Z");
      m2.setAttribute('d', "M 560,250 C 560,150 440,190 440,250 C 440,310 560,350 560,250 Z");
      m2.style.opacity = 1;
      ch1_arm2.style.opacity = 0; ch2_arm2.style.opacity = 0;
      ch1.setAttribute('transform', 'translate(240, 230) rotate(20) scale(1)');
      ch2.setAttribute('transform', 'translate(250, 270) rotate(-10) scale(1)');
      f1.setAttribute('transform', 'translate(550, 230) rotate(15) scale(1)');
      f2.setAttribute('transform', 'translate(560, 270) rotate(-40) scale(1)');
      f1.style.opacity = 1; f2.style.opacity = 1;
    }
    else if (index === 6) {
      m1.setAttribute('d', "M 240,250 m -100,0 a 100,100 0 1,0 200,0 a 100,100 0 1,0 -200,0");
      m2.setAttribute('d', "M 560,250 m -100,0 a 100,100 0 1,0 200,0 a 100,100 0 1,0 -200,0");
      m2.style.opacity = 1;
      n1.style.opacity = 1; n2.style.opacity = 1;
      n1.setAttribute('cx', 240); n1.setAttribute('cy', 250); n1.setAttribute('r', 45);
      n2.setAttribute('cx', 560); n2.setAttribute('cy', 250); n2.setAttribute('r', 45);
      ch1_arm2.style.opacity = 0; ch2_arm2.style.opacity = 0;
      ch1.setAttribute('transform', 'translate(235, 240) rotate(10) scale(0.6)');
      ch2.setAttribute('transform', 'translate(245, 255) rotate(-20) scale(0.6)');
      f1.setAttribute('transform', 'translate(555, 240) rotate(5) scale(0.6)');
      f2.setAttribute('transform', 'translate(565, 255) rotate(-15) scale(0.6)');
      f1.style.opacity = 1; f2.style.opacity = 1;
    }
  }

  function runMeiosisTimeline() {
    if (index === 0) {
      ch1.setAttribute('transform', 'translate(385, 240) rotate(15) scale(0.6)');
      ch2.setAttribute('transform', 'translate(415, 260) rotate(-35) scale(0.6)');
    }
    else if (index === 1) {
      ch1.setAttribute('transform', 'translate(388, 250) rotate(45) scale(1.2)');
      ch2.setAttribute('transform', 'translate(412, 250) rotate(45) scale(1.2)');
    }
    else if (index === 2) {
      n1.style.opacity = 0; spindles.style.opacity = 1;
      m1.setAttribute('d', "M 400,250 m -140,0 a 140,110 0 1,0 280,0 a 140,110 0 1,0 -280,0");
      ch1.setAttribute('transform', 'translate(370, 250) rotate(90) scale(1.3)');
      ch2.setAttribute('transform', 'translate(430, 250) rotate(90) scale(1.3)');
    }
    else if (index === 3) {
      n1.style.opacity = 0; spindles.style.opacity = 1;
      m1.setAttribute('d', "M 400,250 m -140,0 a 140,110 0 1,0 280,0 a 140,110 0 1,0 -280,0");
      ch1.setAttribute('transform', 'translate(240, 250) rotate(45) scale(1.2)');
      ch2.setAttribute('transform', 'translate(560, 250) rotate(-45) scale(1.2)');
    }
    else if (index === 4) {
      n1.style.opacity = 0;
      m1.setAttribute('d', "M 240,250 m -95,0 a 95,95 0 1,0 190,0 a 95,95 0 1,0 -190,0");
      m2.setAttribute('d', "M 560,250 m -95,0 a 95,95 0 1,0 190,0 a 95,95 0 1,0 -190,0");
      m2.style.opacity = 1;
      ch1.setAttribute('transform', 'translate(240, 250) rotate(90) scale(1.2)');
      ch2.setAttribute('transform', 'translate(560, 250) rotate(90) scale(1.2)');
    }
    else if (index === 5) {
      n1.style.opacity = 0;
      m1.setAttribute('d', "M 240,250 m -95,0 a 95,95 0 1,0 190,0 a 95,95 0 1,0 -190,0");
      m2.setAttribute('d', "M 560,250 m -95,0 a 95,95 0 1,0 190,0 a 95,95 0 1,0 -190,0");
      m2.style.opacity = 1;
      ch1_arm2.style.opacity = 0; ch2_arm2.style.opacity = 0;
      ch1.setAttribute('transform', 'translate(240, 150) rotate(0) scale(1)');
      ch2.setAttribute('transform', 'translate(560, 150) rotate(0) scale(1)');
      
      f1.setAttribute('transform', 'translate(240, 350) rotate(180) scale(1)');
      f2.setAttribute('transform', 'translate(560, 350) rotate(180) scale(1)');
      f1.style.opacity = 1; f2.style.opacity = 1;
    }
    else if (index === 6) {
      n1.style.opacity = 0;
      m1.style.opacity = 0; m2.style.opacity = 0;
      m3.style.opacity = 1; m4.style.opacity = 1; m5.style.opacity = 1; m6.style.opacity = 1;
      m3.setAttribute('r', 65); m4.setAttribute('r', 65); m5.setAttribute('r', 65); m6.setAttribute('r', 65);
      
      ch1_arm2.style.opacity = 0; ch2_arm2.style.opacity = 0;
      ch1.setAttribute('transform', 'translate(240, 140) rotate(45) scale(0.6)');
      f1.setAttribute('transform', 'translate(240, 360) rotate(-45) scale(0.6)');
      ch2.setAttribute('transform', 'translate(560, 140) rotate(15) scale(0.6)');
      f2.setAttribute('transform', 'translate(560, 360) rotate(-15) scale(0.6)');
      f1.style.opacity = 1; f2.style.opacity = 1;
    }
  }

  // Key Listeners
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' && index < data.length - 1) {
      index++; render();
    } else if (e.key === 'ArrowLeft' && index > 0) {
      index--; render();
    }
  });

  // Switch Toggle click logic
  switchBtn.addEventListener('click', () => {
    if (mode === 'mitosis') {
      mode = 'meiosis'; data = meiosis;
      typeDisplay.textContent = "Meiosis (Sex Cells)";
      switchBtn.textContent = "Switch to Mitosis";
    } else {
      mode = 'mitosis'; data = mitosis;
      typeDisplay.textContent = "Mitosis (Body Cells)";
      switchBtn.textContent = "Switch to Meiosis";
    }
    index = 0; render();
  });

  // Initial render loop startup invoke
  render();
})();
</script>
</body>
</html>
